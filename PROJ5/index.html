<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
    }
    body{
        background: #262a2f;
    }
    .container{
        background: #fff;
        width:400px;
        padding: 25px 35px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%,-50%);
        border-radius: 10px;
    }
    .container h2{
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 8px;
    }
    .container input{
        width: 100%;
        height: 50px;
        border: 1px solid #494eea;
        outline: 0;
        padding: 10px;
        margin: 10px 0 20px;
        border-radius: 5px;
    }
    .container button{
        width: 100%;
        height: 50px;
        background: #494eea;
        color: #fff;
        border: 0;
        outline: 0;
        border-radius: 5px;
        box-shadow: 0 10px 10px rgba(0,0,0,0.1);
        cursor: pointer;
        margin: 20px 0;
        font-weight: 500;
    }
    #imgBox{
        width: 200px;
        border-radius: 5px;
       max-height: 0;
       overflow: hidden;
       transition:max-height 0.3s;
    }
    #imgBox img{
        width: 100%;
        height: auto;
    }
    #imgBox.show-img{
        max-height: 200px;
        margin: 10px auto;
        border: 1px solid #d1d1d1;
    }
    .error{
        animation: shake 0.1s linear 10;
    }
    @keyframes shake{
        0%{
            transform: translate(0);
        }
        25%{
            transform: translate(-2px);
        }
        50%{
            transform: translate(0);
        }
        75%{
            transform: translate(2px);
        }
        100%{
            transform: translate(0);
        }
    }
</style>
<body>
    <div class="container">
        <p>Enter your text or URL</p>
        <input type="text"  id="qrText" placeholder="Link And Subscribe">
        <div id="imgBox">
            <img src="" alt="" id="qrImage">
        </div>
        <button onclick="generateQRcode()">Generate QR Code</button>
    </div>
    <script>
        let imgBox=document.querySelector("#imgBox");
        let qrImage=document.querySelector("#qrImage");
        let qrText=document.querySelector("#qrText");

        function generateQRcode(){
            if(qrText.value.trim().length>0){
                 qrImage.src = "";
                  qrImage.alt = "Loading...";
               qrImage.src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+encodeURIComponent(qrText.value);
             imgBox.classList.add("show-img");
            }else{
                qrText.classList.add("error");
                 imgBox.classList.remove("show-img");
                setTimeout(()=>{
                    qrText.classList.remove("error");
                },1000);
            }
        }
        qrText.addEventListener("keypress", function(e){
                if(e.key === "Enter"){
                    generateQRcode();
                }
        });
    </script>
</body>
</html>
